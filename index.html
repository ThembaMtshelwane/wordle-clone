<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle</title>
    <link rel="stylesheet" href="/src/public/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300&display=swap" rel="stylesheet">
</head>
<body>
    <head>
        <nav>
            <div id="left-section">
                <button class="nav-btn"  id="home">Wordle</button>
            </div>

            <div id="right-section">
                <button class="nav-btn" id="login">Login</button>
                <button class="nav-btn" id="register">Register</button>
                <button class="nav-btn" id="settings">Settings</button>
                <button class="nav-btn" id="menu">Menu</button>
            </div>
        </nav>
    </head>

    <main>
        <section id="grid">
            <div class="row">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
            <div  class="row">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
            <div  class="row">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
            <div  class="row">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
            <div  class="row">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
            <div class="row">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
           
        </section>
        <section id="keyboard">
            <div class="row">
                <button data-key ="Q" class="keyinput">Q</button>
                <button data-key ="W" class="keyinput">W</button>
                <button data-key ="E" class="keyinput">E</button>
                <button data-key ="R" class="keyinput">R</button>
                <button data-key ="T" class="keyinput">T</button>
                <button data-key ="Y" class="keyinput">Y</button>
                <button data-key ="U" class="keyinput">U</button>
                <button data-key ="I" class="keyinput">I</button>
                <button data-key ="O" class="keyinput">O</button>
                <button data-key ="P" class="keyinput">P</button>                
            </div>

            <div class="row">
                <button data-key ="A" class="keyinput">A</button>
                <button data-key ="S" class="keyinput">S</button>
                <button data-key ="D" class="keyinput">D</button>
                <button data-key ="F" class="keyinput">F</button>
                <button data-key ="G" class="keyinput">G</button>
                <button data-key ="H" class="keyinput">H</button>
                <button data-key ="J" class="keyinput">J</button>
                <button data-key ="K" class="keyinput">K</button>
                <button data-key ="L" class="keyinput">L</button>
            </div>

            <div class="row">
                <button data-key ="Backspace" class="keyinput">Delete</button>
                <button data-key ="Z" class="keyinput">Z</button>
                <button data-key ="X" class="keyinput">X</button>
                <button data-key ="C" class="keyinput">C</button>
                <button data-key ="V" class="keyinput">V</button>
                <button data-key ="B" class="keyinput">B</button>
                <button data-key ="N" class="keyinput">N</button>
                <button data-key ="M" class="keyinput">M</button>
                <button data-key ="Enter" class="keyinput">Enter</button>
            </div>
        </section>
    </main>

    <footer>

    </footer>
    <script 
        src="./src/modules/keyInputs.js" 
        
    ></script>
  <!-- type="module" -->
    
</body>
</html>
