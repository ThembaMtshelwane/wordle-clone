<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle</title>
    <link rel="stylesheet" href="/src/public/styles.css">
</head>
<body>
    <head>
        <nav>
            <div id="left-section">
                <button class="nav-btn"  id="home">Wordle</button>
            </div>

            <div id="right-section">
                <button class="nav-btn" id="login">Login</button>
                <button class="nav-btn" id="register">Register</button>
                <button class="nav-btn" id="settings">Settings</button>
                <button class="nav-btn" id="menu">Menu</button>
            </div>
        </nav>
    </head>

    <main>
        <section id="grid">
            <div class="row">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
            <div  class="row">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
            <div  class="row">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
            <div  class="row">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
            <div  class="row">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
            <div class="row">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
           
        </section>
        <section id="keyboard">
            <div class="row">
                <button class="keyinput">Q</button>
                <button class="keyinput">W</button>
                <button class="keyinput">E</button>
                <button class="keyinput">R</button>
                <button class="keyinput">T</button>
                <button class="keyinput">Y</button>
                <button class="keyinput">U</button>
                <button class="keyinput">I</button>
                <button class="keyinput">O</button>
                <button class="keyinput">P</button>                
            </div>

            <div class="row">
                <button class="keyinput">A</button>
                <button class="keyinput">S</button>
                <button class="keyinput">D</button>
                <button class="keyinput">F</button>
                <button class="keyinput">G</button>
                <button class="keyinput">H</button>
                <button class="keyinput">J</button>
                <button class="keyinput">K</button>
                <button class="keyinput">L</button>
            </div>

            <div class="row">
                <button class="keyinput">Delete</button>
                <button class="keyinput">Z</button>
                <button class="keyinput">X</button>
                <button class="keyinput">C</button>
                <button class="keyinput">V</button>
                <button class="keyinput">B</button>
                <button class="keyinput">N</button>
                <button class="keyinput">M</button>
                <button class="keyinput">Enter</button>
            </div>
        </section>
    </main>

    <footer>

    </footer>

</body>
</html>
